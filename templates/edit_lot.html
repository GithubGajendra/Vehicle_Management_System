<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Parking Lot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Edit Parking Lot</h2>
    <form method="post">
        <div class="mb-3">
            <label>Lot Name</label>
            <input type="text" name="name" value="{{ lot.name }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Capacity</label>
            <input type="number" name="capacity" value="{{ lot.capacity }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Price per Hour</label>
            <input type="number" name="price" value="{{ lot.price }}" class="form-control" step="0.01" required>
        </div>
        <div class="mb-3">
            <label>Pincode</label>
            <input type="text" name="pincode" value="{{ lot.pincode }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Address</label>
            <textarea name="address" class="form-control" required>{{ lot.address }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Update Lot</button>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
