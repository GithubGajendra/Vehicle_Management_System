<!-- templates/view_spots.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Parking Spot Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Parking Spots for Lot: {{ lot.name }}</h2>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary mb-3">← Back to Dashboard</a>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Spot ID</th>
                <th>Spot Number</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
        {% for spot in spots %}
            <tr class="{% if spot.status == 'Occupied' %}table-danger{% else %}table-success{% endif %}">
                <td>{{ spot.id }}</td>
                <td>{{ spot.spotnumber }}</td>
                <td>{{ spot.status }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
